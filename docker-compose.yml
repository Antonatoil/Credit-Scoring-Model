services:
  db:
    image: postgres:16
    container_name: credit_scoring_db
    environment:
      POSTGRES_DB: credit_scoring
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_scoring"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: credit_scoring_api
    environment:
      DATABASE_URL: postgresql+pg8000://credit_user:credit_pass@db:5432/credit_scoring
      MODEL_PATH: /app/models/catboost_credit_scoring.cbm
      ARTIFACTS_PATH: /app/models/catboost_artifacts.json
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data: